# Example: Basic BCOS v2 Scan Workflow
# Copy this file to .github/workflows/bcos-scan.yml

name: BCOS v2 Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  bcos-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Run BCOS v2 Scan
        id: bcos
        uses: HuiNeng6/bcos-action@v1
        with:
          tier: 'L1'
          fail-on-unmet: 'false'
      
      - name: Display Results
        run: |
          echo "Trust Score: ${{ steps.bcos.outputs.trust_score }}"
          echo "Cert ID: ${{ steps.bcos.outputs.cert_id }}"
          echo "Tier Met: ${{ steps.bcos.outputs.tier_met }}"
      
      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const score = '${{ steps.bcos.outputs.trust_score }}';
            const certId = '${{ steps.bcos.outputs.cert_id }}';
            const tierMet = '${{ steps.bcos.outputs.tier_met }}';
            
            const badgeColor = tierMet === 'true' ? 'brightgreen' : 'yellow';
            const badge = `![BCOS Badge](https://img.shields.io/badge/BCOS-${score}%2F100-${badgeColor})`;
            
            const body = `## 🛡️ BCOS v2 Scan Results
            
            ${badge}
            
            | Metric | Value |
            |--------|-------|
            | Trust Score | **${score}/100** |
            | Cert ID | \`${certId}\` |
            | Tier Met | ${tierMet === 'true' ? '✅ Yes' : '❌ No'} |
            
            [View Full Report](https://rustchain.org/bcos/verify/${certId})
            
            ---
            *BCOS v2 Engine • [Learn More](https://rustchain.org/bcos/)*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });